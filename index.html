<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:transparent;
  text-align:center;
  font-family:'DM Serif Display', serif;
  color:#7a8b6f;
}

/* ===== CALENDARIO ===== */
.calendar-wrap{
  max-width:420px;
  margin:40px auto 20px;
  background:#f6efe6;
  padding:30px 20px;
  border-radius:12px;
}

.month{
  letter-spacing:4px;
  margin-bottom:10px;
}

.days, .numbers{
  display:grid;
  grid-template-columns:repeat(7,1fr);
}

.days{
  font-size:14px;
  margin-bottom:10px;
}

.line{
  height:1px;
  background:#c9a646;
  margin:10px 0 15px;
}

.numbers{
  gap:8px;
  font-size:15px;
}

.special{
  position:relative;
  font-weight:bold;
  color:#c9a646;
}

/* ❤️ CORAZÓN LATIENDO */
.heart{
  position:absolute;
  width:60px;
  left:-10px;
  top:-10px;
  animation:latido 1.4s infinite;
}

@keyframes latido{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.15)}
}

.date-text{
  font-family:'Alex Brush', cursive;
  font-size:26px;
  margin-top:25px;
}

/* ===== CONTADOR ===== */
.subtitle{
  font-size:26px;
  margin-top:40px;
}

.title{
  font-family:'Alex Brush', cursive;
  font-size:48px;
  margin-bottom:20px;
}

.countdown{
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
  margin-bottom:30px;
}

.box{
  min-width:70px;
}

.number{
  font-size:48px;
  color:#c9a646;
}

.label{
  font-family:'Alex Brush', cursive;
  font-size:22px;
}

/* 📱 MOBILE */
@media(max-width:600px){
  .title{font-size:36px}
  .number{font-size:38px}
  .label{font-size:18px}
}
</style>
</head>

<body>

<!-- ===== CALENDARIO ARRIBA ===== -->
<div class="calendar-wrap">

  <h2 class="month">MAYO</h2>

  <div class="days">
    <div>D</div><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div>
  </div>

  <div class="line"></div>

  <div class="numbers">
    <div></div><div></div><div></div><div></div><div></div><div>1</div><div>2</div>
    <div>3</div><div>4</div><div>5</div><div>6</div><div>7</div><div>8</div><div>9</div>
    <div>10</div><div>11</div><div>12</div><div>13</div><div>14</div><div>15</div><div>16</div>
    <div>17</div><div>18</div><div>19</div><div>20</div><div>21</div><div>22</div>

    <!-- DIA ESPECIAL -->
    <div class="special">
      23
      <svg class="heart" viewBox="0 0 100 80">
        <path d="M10,40 C10,15 40,15 50,35 C60,15 90,15 90,40 C90,60 50,75 50,75 C50,75 10,60 10,40Z"
          fill="none"
          stroke="#c9a646"
          stroke-width="2"/>
      </svg>
    </div>

    <div>24</div><div>25</div><div>26</div><div>27</div><div>28</div><div>29</div><div>30</div>
    <div>31</div>
  </div>

  <div class="date-text">
    Veintitrés de Mayo del<br>Veinte Veintiséis
  </div>

</div>

<!-- ===== CONTADOR ABAJO ===== -->
<div class="subtitle">Contando los días</div>
<div class="title">Para nuestro “Sí”</div>

<div class="countdown">
  <div class="box">
    <div class="number" id="dias">0</div>
    <div class="label">Días</div>
  </div>
  <div class="box">
    <div class="number" id="horas">0</div>
    <div class="label">Horas</div>
  </div>
  <div class="box">
    <div class="number" id="minutos">0</div>
    <div class="label">Minutos</div>
  </div>
  <div class="box">
    <div class="number" id="segundos">0</div>
    <div class="label">Segundos</div>
  </div>
</div>

<script>
// FECHA BODA
const boda = new Date("May 23, 2026 00:00:00").getTime();

setInterval(()=>{
  const ahora = new Date().getTime();
  const diff = boda - ahora;

  document.getElementById("dias").innerText = Math.floor(diff/(1000*60*60*24));
  document.getElementById("horas").innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  document.getElementById("minutos").innerText = Math.floor((diff%(1000*60*60))/(1000*60));
  document.getElementById("segundos").innerText = Math.floor((diff%(1000*60))/1000);
},1000);
</script>

</body>
</html>
